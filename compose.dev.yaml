services:
  frontend:
    build:
      context: ./frontend
      target: dev
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8081}"
    ports:
      - "3002:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: "${VITE_API_URL:-http://localhost:8081}"
    command: npm run dev -- --host 0.0.0.0
    profiles:
      - dev
