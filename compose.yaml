# Full stack: gRPC translation server + Ollama (LLM) + Redis (cache).
# Each component lives in its own folder and container:
#   server/  - Go gRPC app (build from server/Dockerfile)
#   ollama/   - LLM runtime (build from ollama/Dockerfile)
#   redis/    - Cache (build from redis/Dockerfile)
#
# Usage:
#   docker compose up -d
#   # First time: pull the model so Ollama can serve requests:
#   docker compose exec ollama ollama pull qwen2.5:7b
#   # Call the service (from host):
#   grpcurl -plaintext -d '{"text":"Hello","source_lang":"en","target_lang":"es"}' localhost:50051 translation.v1.TranslationService/Translate
#
# Optional: use GPU for Ollama (uncomment deploy.resources.reservations.devices for the ollama service).

services:
  redis:
    build: ./redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  ollama:
    build: ./ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Uncomment for NVIDIA GPU:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  server:
    build: ./server
    ports:
      - "50051:50051"
    environment:
      GRPC_PORT: "50051"
      REDIS_ADDR: "redis:6379"
      REDIS_TTL_SECONDS: "300"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      OLLAMA_BASE_URL: "http://ollama:11434"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
