services:
  redis:
    build: ./redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  ollama:
    build: ./ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  server:
    build: ./server
    ports:
      - "50051:50051"
      - "8081:8080"
    environment:
      GRPC_PORT: "50051"
      HTTP_PORT: "8080"
      REDIS_ADDR: "redis:6379"
      REDIS_TTL_SECONDS: "300"
      OLLAMA_MODEL: "${OLLAMA_MODEL:-qwen2.5:7b}"
      OLLAMA_BASE_URL: "http://ollama:11434"
    depends_on:
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8081}"
    ports:
      - "3002:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  redis_data:
  ollama_data:
